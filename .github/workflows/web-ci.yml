name: web-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify-web-and-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install node dependencies
        run: npm ci

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Build web assets
        run: npm run build:web

      - name: Backend checks
        run: npm run backend:check

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          cd backend
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8001 > ../backend.log 2>&1 &

      - name: Start web frontend
        run: nohup php -S 127.0.0.1:8080 -t frontend/web/public > frontend.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8001/ > /dev/null && curl -sSf http://127.0.0.1:8080/login.php > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Services did not start in time"
          exit 1

      - name: Web E2E
        run: npm run web:test:e2e

      - name: Web accessibility audit
        run: npm run web:test:a11y

      - name: Upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: static/evidence/playwright-report

      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-ci-logs
          path: |
            backend.log
            frontend.log
