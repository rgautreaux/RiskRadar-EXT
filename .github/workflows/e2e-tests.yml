name: E2E Tests (Playwright)

on:
  push:
    branches:
      - main
      - 'Rebecca-Gautreaux-*'
  pull_request:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: riskradarweb_db
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npm run playwright:install

      - name: Set up backend environment
        run: |
          cat > backend/.env << EOF
          DATABASE_URL=mysql+pymysql://root:root@127.0.0.1:3306/riskradarweb_db
          JWT_SECRET_KEY=test-secret-key-for-ci-only
          EMAIL_ENCRYPTION_KEY=test-fernet-key-32-chars-long-12345==
          CORS_ALLOWED_ORIGINS=http://127.0.0.1:8080,http://localhost:8080
          GUEST_DAILY_LIMIT=10
          OPENROUTER_API_KEY=sk-test-key
          FIRECRAWL_API_KEY=test-key
          EOF

      - name: Initialize backend database
        run: |
          cd backend
          python -c "from db.init_db import init_db; init_db()"

      - name: Start backend server
        run: |
          cd backend
          python -m uvicorn main:app --host 127.0.0.1 --port 8001 > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          sleep 3
        timeout-minutes: 5

      - name: Start frontend server (PHP)
        run: |
          php -S 127.0.0.1:8080 -t frontend/web/public > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid
          sleep 2
        timeout-minutes: 5

      - name: Wait for services to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8001/health > /dev/null 2>&1 && \
               curl -s http://127.0.0.1:8080/ > /dev/null 2>&1; then
              echo "Services ready"
              exit 0
            fi
            echo "Waiting for services... ($i/30)"
            sleep 1
          done
          echo "Services failed to start"
          cat /tmp/backend.log
          cat /tmp/frontend.log
          exit 1

      - name: Run Playwright E2E tests
        run: npm run web:test:e2e
        env:
          RISKRADAR_WEB_BASE_URL: http://127.0.0.1:8080

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Cleanup
        if: always()
        run: |
          kill $(cat /tmp/backend.pid 2>/dev/null) 2>/dev/null || true
          kill $(cat /tmp/frontend.pid 2>/dev/null) 2>/dev/null || true
